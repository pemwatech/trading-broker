{% extends "base.html" %}
{% block title %}Sign up — ZedBinaryOption{% endblock %}
{% block body %}
<section class="container" style="max-width:480px;padding:60px 20px">
  <div class="card">
    <div class="kicker">Get started</div>
    <h1 style="margin-bottom:18px">Create your account</h1>
    <div id="alert"></div>
    <form id="form">
      <div class="field"><label>Full name</label><input class="input" name="full_name" required></div>
      <div class="field"><label>Email</label><input class="input" type="email" name="email" required></div>
      <div class="field"><label>Password (min 6)</label><input class="input" type="password" name="password" minlength="6" required></div>
      <button class="btn btn-primary btn-block">Create account</button>
    </form>
    <div class="text-center mt-3 muted">— or —</div>
    <a href="/auth/google" class="btn btn-ghost btn-block mt-3">
      Sign up with Google{% if not google_enabled %} (demo){% endif %}
    </a>
    <p class="muted text-center mt-3" style="font-size:13px">Have an account? <a href="/login">Login</a></p>
  </div>
</section>
<script>
document.getElementById('form').addEventListener('submit', async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const r = await fetch('/api/signup',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(Object.fromEntries(fd))});
  const data = await r.json();
  const a = document.getElementById('alert');
  if(!r.ok){ a.innerHTML = `<div class="alert err">${data.error||'Signup failed'}</div>`; return; }
  location.href = data.redirect || '/dashboard';
});
</script>
{% endblock %}
